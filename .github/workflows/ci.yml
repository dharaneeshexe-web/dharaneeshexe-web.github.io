name: CI

# Quality gate for the static portfolio site. Runs on every push and pull
# request. Tools are pinned devDependencies, installed once per job via
# `npm ci` for reproducibility. Lint, format, spell, test and secret-scan are
# blocking; Lighthouse (scores vary), npm audit and the link check (links to
# not-yet-migrated repos and bot-blocking social sites) are advisory.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege by default; individual jobs opt in to more if needed.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save Action minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (node --test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm test

  html-lint:
    name: HTML lint (htmlhint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint:html

  css-lint:
    name: CSS lint (stylelint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint:css

  js-lint:
    name: JS lint (eslint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint:js

  format-check:
    name: Format check (prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run format:check

  markdown-lint:
    name: Markdown lint (markdownlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint:md

  spellcheck:
    name: Spellcheck (codespell)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: codespell-project/actions-codespell@v2
        with:
          skip: ./assets,./package-lock.json,./portfolio-data.json,./og-image.png
          ignore_words_list: nd,te,ot

  link-check:
    name: Link check (lychee)
    runs-on: ubuntu-latest
    # Advisory: the portfolio intentionally links to projects not yet migrated
    # to this account and to social sites that block bots (LinkedIn/X return
    # 999). It reports dead links without blocking the gate.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Check links in HTML and Markdown
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --accept 200,206,429,999 "**/*.html" "**/*.md"
          fail: true

  lighthouse:
    name: Lighthouse (perf / a11y / SEO / best-practices)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-review:
    name: Dependency review (PR only)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  npm-audit:
    name: Dependency audit (npm)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm audit --audit-level=high
