version: 2
updates:
  # Keep GitHub Actions pinned versions fresh.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"

  # Keep npm dependencies (puppeteer + dev tooling) fresh.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore"
